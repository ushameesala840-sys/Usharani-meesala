</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f6fa;
            color: var(--dark);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--light);
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--secondary);
        }

        button {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit {
            background: var(--secondary);
            color: white;
        }

        .btn-submit:hover {
            background: #2980b9;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--light);
        }

        th {
            background-color: var(--primary);
            color: white;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 3px;
            width: auto;
            color: white;
        }

        .btn-edit {
            background: var(--success);
        }

        .btn-delete {
            background: var(--danger);
        }

        .empty-message {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Student Management System</h1>
    </header>

    <div class="main-content">
        <!-- Student Form Card -->
        <div class="card">
            <h2 id="form-title">Add New Student</h2>
            <form id="student-form">
                <!-- Hidden input to track student index during updates -->
                <input type="hidden" id="student-index">
                
                <div class="form-group">
                    <label for="roll-no">Roll Number</label>
                    <input type="text" id="roll-no" required placeholder="e.g. 101">
                </div>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="e.g. John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="e.g. john@example.com">
                </div>
                <div class="form-group">
                    <label for="course">Course/Class</label>
                    <select id="course" required>
                        <option value="" disabled selected>Select a course</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Business Administration">Business Administration</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn">Save Student</button>
            </form>
        </div>

        <!-- Student Directory Records Card -->
        <div class="card">
            <h2>Student Directory</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Course</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-list">
                        <!-- Student records will be inserted here dynamically -->
                    </tbody>
                </table>
                <div id="no-data" class="empty-message">No student records found.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // System Data Array (Initialized with demo data)
    let students = [
        { rollNo: "101", name: "Alice Johnson", email: "alice@example.com", course: "Computer Science" },
        { rollNo: "102", name: "Bob Smith", email: "bob@example.com", course: "Business Administration" }
    ];

    // DOM Elements
    const studentForm = document.getElementById('student-form');
    const studentIndexInput = document.getElementById('student-index');
    const rollNoInput = document.getElementById('roll-no');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const courseSelect = document.getElementById('course');
    const submitBtn = document.getElementById('submit-btn');
    const formTitle = document.getElementById('form-title');
    const studentList = document.getElementById('student-list');
    const noDataMessage = document.getElementById('no-data');

    // Display student records in the UI table
    function renderStudents() {
        studentList.innerHTML = '';
        
        if (students.length === 0) {
            noDataMessage.style.display = 'block';
            return;
        }
        
        noDataMessage.style.display = 'none';

        students.forEach((student, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${student.rollNo}</td>
                <td>${student.name}</td>
                <td>${student.email}</td>
                <td>${student.course}</td>
                <td class="actions">
                    <button class="btn-small btn-edit" onclick="editStudent(${index})">Edit</button>
                    <button class="btn-small btn-delete" onclick="deleteStudent(${index})">Delete</button>
                </td>
            `;
            studentList.appendChild(row);
        });
    }

    // Handle Create and Update actions
    studentForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const rollNo = rollNoInput.value.trim();
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const course = courseSelect.value;
        const index = studentIndexInput.value;

        // Check for duplicate Roll Number during creation
        if (index === "" && students.some(student => student.rollNo === rollNo)) {
            alert("A student with this Roll Number already exists!");
            return;
        }

        const studentData = { rollNo, name, email, course };

        if (index === "") {
            // Create action
            students.push(studentData);
        } else {
            // Update action
            students[index] = studentData;
            resetForm();
        }

        renderStudents();
        studentForm.reset();
    });

    // Populate form data for editing
    function editStudent(index) {
        const student = students[index];
        studentIndexInput.value = index;
        rollNoInput.value = student.rollNo;
        nameInput.value = student.name;
        emailInput.value = student.email;
        courseSelect.value = student.course;

        formTitle.textContent = "Edit Student Profile";
        submitBtn.textContent = "Update Student";
        rollNoInput.disabled = true; // Lock identity parameter during update
    }

    // Delete a record from the roster
    function deleteStudent(index) {
        if (confirm("Are you sure you want to delete this student record?")) {
            students.splice(index, 1);
            resetForm();
            renderStudents();
        }
    }
